{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-icon">⚠️</div>
    <div class="error-code">500</div>
    <h2 class="fw-bold text-primary-cuu mt-2">Something Went Wrong</h2>
    <p class="text-muted mb-4">Our server encountered an unexpected error. Please try again shortly.</p>
    <a href="/" class="btn-primary-cuu px-5 py-2 fs-5">Go Home</a>
</div>
{% endblock %}
