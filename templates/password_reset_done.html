{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card text-center">
        <i class="bi bi-envelope-check-fill fs-1 text-success mb-3"></i>
        <h2>Check Your Email</h2>
        <p class="text-muted">If an account exists for that email address, you'll receive a password reset link shortly.</p>
        <a href="{% url 'login' %}" class="btn-auth d-block mt-3">Back to Login</a>
    </div>
</div>
{% endblock %}
